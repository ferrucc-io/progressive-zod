name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci
      - run: npm run build
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci
      - run: npm run build

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e-test-app

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e-test-app

      - name: Run e2e tests
        run: npm test
        working-directory: e2e-test-app
